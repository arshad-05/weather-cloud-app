<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Weather Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-6 font-sans">
    <div class="max-w-4xl mx-auto">
        <div class="flex gap-2 mb-8">
            <input id="cityInput" type="text" placeholder="Search city..." class="w-full p-4 rounded-2xl bg-white/10 outline-none border border-white/10 focus:border-white/30">
            <button onclick="getWeather()" class="bg-white text-black px-6 rounded-2xl font-bold">Search</button>
        </div>

        <div id="mainContent" class="hidden">
            <div class="text-center mb-10">
                <h1 id="cityName" class="text-4xl font-light">--</h1>
                <div id="temp" class="text-8xl font-thin my-4">0°</div>
                <p id="condition" class="opacity-60 uppercase tracking-widest text-sm">Loading Cloud Data...</p>
            </div>

            <h3 class="text-sm font-bold opacity-50 mb-4 uppercase tracking-wider">Hourly Forecast</h3>
            <div id="hourlyContainer" class="flex gap-4 overflow-x-auto no-scrollbar pb-6 mb-8">
                </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="opacity-50 text-xs mb-4 uppercase">Current Wind</h3>
                    <div id="wind" class="text-3xl font-light">-- km/h</div>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <h3 class="opacity-50 text-xs mb-4 uppercase">Cloud Status</h3>
                    <div class="text-3xl font-light">Verified</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById('cityInput').value;
            const res = await fetch(`/api/weather?city=${city}`);
            const data = await res.json();
            
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('cityName').innerText = data.city;
            document.getElementById('temp').innerText = Math.round(data.temp) + "°";
            document.getElementById('wind').innerText = data.wind + " km/h";

            // Inject Hourly Items
            const hourlyContainer = document.getElementById('hourlyContainer');
            hourlyContainer.innerHTML = '';
            data.hourly.forEach(hour => {
                const item = `
                    <div class="glass min-w-[90px] p-4 rounded-3xl text-center">
                        <p class="text-[10px] opacity-50 mb-2">${hour.time}</p>
                        <p class="text-xl font-semibold">${Math.round(hour.temp)}°</p>
                    </div>
                `;
                hourlyContainer.innerHTML += item;
            });
        }
    </script>
</body>
</html>
